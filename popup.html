<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>OmniMonaco</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --border: #334155;
            --success: #10b981;
            --danger: #ef4444;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            width: 250px;
        }

        .container {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .header h1 {
            margin: 0;
            font-size: 18px;
            font-weight: 600;
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        .status-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            background: var(--card-bg);
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
            box-sizing: border-box;
        }

        .status-text {
            font-size: 14px;
            font-weight: 500;
        }

        /* Toggle Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 22px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--border);
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: var(--success);
        }

        input:checked+.slider:before {
            transform: translateX(18px);
        }

        .options-btn {
            width: 100%;
            padding: 10px;
            background-color: rgba(59, 130, 246, 0.1);
            color: var(--primary);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .options-btn:hover {
            background-color: rgba(59, 130, 246, 0.2);
        }

        .instruction {
            font-size: 12px;
            color: var(--text-muted);
            text-align: center;
            margin-top: 4px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>OmniMonaco</h1>
        </div>

        <div class="status-container">
            <span class="status-text" id="statusLabel">Ativo</span>
            <label class="switch">
                <input type="checkbox" id="toggleExtension" checked>
                <span class="slider"></span>
            </label>
        </div>

        <button class="options-btn" id="openOptionsBtn">
            ⚙️ Configurações
        </button>

        <div class="instruction">
            Pressione <b>Ctrl+U</b> no editor
        </div>
    </div>
    <script src="popup.js"></script>
</body>

</html>
